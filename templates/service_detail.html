{% extends "base.html" %}

{% block title %}{{ page.title }}{% endblock title %}

{% block body %}
<section class="container py-5">
  <div class="glass-card p-0 overflow-hidden">
    <img src="{{ page.hero_image }}" alt="{{ page.title }}" class="w-100" style="height: 320px; object-fit: cover;">
    <div class="p-4 p-lg-5">
      <h1 class="mb-2">{{ page.title }}</h1>
      <p class="text-muted mb-4">{{ page.subtitle }}</p>
      <div class="row g-3">
        {% for item in page.items %}
          <div class="col-md-6 col-lg-3">
            <div class="card h-100 border-0 shadow-sm hover-card">
              <img src="{{ item.image }}" alt="{{ item.name }}" class="card-img-top" style="height: 200px; object-fit: cover;">
              <div class="card-body">
                <h6 class="card-title mb-1">{{ item.name }}</h6>
                <p class="card-text text-muted small mb-2">{{ item.description }}</p>
                <span class="fw-semibold small">{{ item.price }}</span>
              </div>
            </div>
          </div>
        {% endfor %}
      </div>
      <a href="/services/" class="btn btn-brand mt-4">Back to All Services</a>
    </div>
  </div>
</section>
{% endblock body %}
